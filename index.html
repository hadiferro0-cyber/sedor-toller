<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סידור עבודה — מנהרות הכרמל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf5ff;--surface:#fff;--surface2:#faf7ff;--border:#e9d5ff;
  --accent:#7c3aed;--accent2:#f59e0b;--karmel:#7c3aed;--krayot:#059669;
  --danger:#dc2626;--warn:#d97706;--text:#1e2235;--muted:#6b7280;
  --radius:12px;--shadow:0 2px 12px rgba(124,58,237,.08);
  --shift-morning:#dbeafe;--shift-morning-text:#1d4ed8;
  --shift-noon:#d1fae5;--shift-noon-text:#065f46;
  --shift-night:#ede9fe;--shift-night-text:#5b21b6;
  --font-size-base:15px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:var(--font-size-base);}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#f5f3ff 0%,#faf5ff 50%,#ede9fe 100%);}
.login-box{background:#fff;border:1px solid var(--border);border-radius:20px;padding:44px 40px;
  width:380px;text-align:center;box-shadow:0 8px 40px rgba(124,58,237,.12);}
.login-logo img{height:70px;object-fit:contain;margin-bottom:16px;}
.login-box input{width:100%;padding:12px 14px;background:#f8faff;border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);font-family:inherit;font-size:15px;margin-bottom:10px;direction:ltr;}
.login-box input:focus{outline:none;border-color:var(--accent);}
.login-err{color:var(--danger);font-size:13px;margin-top:6px;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
header{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;
  display:flex;align-items:center;gap:10px;height:58px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(124,58,237,.06);}
.header-logo{height:40px;object-fit:contain;}
nav{display:flex;gap:2px;flex:1;overflow-x:auto;}
.nav-btn{padding:6px 13px;border-radius:7px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;white-space:nowrap;}
.nav-btn:hover{background:var(--bg);color:var(--text);}
.nav-btn.active{background:var(--accent);color:#fff;}
.user-info{font-size:12px;color:var(--muted);white-space:nowrap;}
.logout-btn{padding:5px 11px;background:transparent;border:1.5px solid var(--border);border-radius:6px;
  color:var(--muted);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;margin-right:6px;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}
main{flex:1;padding:16px;max-width:1600px;width:100%;margin:0 auto;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;border:none;
  cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:.15s;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.2);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-success{background:#059669;color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-warn{background:var(--warn);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);font-weight:600;}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-full{width:100%;justify-content:center;}

/* SCHED TYPE BAR */
.sched-type-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.stype-btn{padding:9px 24px;border-radius:9px;border:2px solid transparent;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:800;transition:.15s;}
.stype-btn.toller{background:#f5f3ff;color:var(--karmel);border-color:#ddd6fe;}
.stype-btn.toller.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.stype-btn.patrol{background:#f0fdf4;color:var(--krayot);border-color:#a7f3d0;}
.stype-btn.patrol.active{background:var(--krayot);color:#fff;border-color:var(--krayot);}

/* PUBLISH BAR */
.publish-bar{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
  padding:11px 16px;display:flex;align-items:center;gap:10px;margin-bottom:12px;box-shadow:var(--shadow);}
.pub-dot{width:9px;height:9px;border-radius:50%;background:#d1d5db;flex-shrink:0;}
.pub-dot.on{background:#10b981;}
.pub-status{flex:1;font-size:13px;color:var(--muted);font-weight:600;}
.pub-status.on{color:#059669;}

/* SCHED LAYOUT */
.sched-layout{display:flex;gap:12px;align-items:flex-start;}
.emp-sidebar{width:170px;flex-shrink:0;position:sticky;top:64px;}
.emp-sidebar-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.emp-list{display:flex;flex-direction:column;gap:3px;max-height:calc(100vh - 240px);overflow-y:auto;}
.emp-chip{padding:8px 10px;border-radius:8px;background:#fff;border:1.5px solid var(--border);
  cursor:pointer;font-size:13px;font-weight:600;transition:.12s;user-select:none;position:relative;}
.emp-chip:hover{border-color:var(--accent);background:#f5f3ff;}
.emp-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.emp-chip.has-cons{border-color:#f59e0b;}
.emp-chip .etype{font-size:10px;opacity:.65;margin-top:1px;font-weight:400;}
.emp-chip .cons-dot{position:absolute;top:5px;left:6px;width:7px;height:7px;border-radius:50%;background:#f59e0b;}
.sel-emp-box{margin-top:8px;padding:9px;background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:8px;font-size:12px;}
.sel-emp-name{font-weight:800;margin-top:2px;color:var(--accent);font-size:14px;}

/* PLAZAS */
.plazas-wrap{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
.plaza-section{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.plaza-hdr{padding:11px 14px;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--border);background:var(--surface2);}
.plaza-hdr.karmel{border-top:4px solid var(--karmel);}
.plaza-hdr.krayot{border-top:4px solid var(--krayot);}
.plaza-hdr h3{font-size:14px;font-weight:800;flex:1;}
.pdot{width:9px;height:9px;border-radius:50%;}
.pdot.karmel{background:var(--karmel);}
.pdot.krayot{background:var(--krayot);}

/* DAYS */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.day-col{border-left:1px solid var(--border);}
.day-col:last-child{border-left:none;}
.day-hdr{padding:7px 4px;text-align:center;background:#f8faff;font-size:11px;font-weight:800;border-bottom:1px solid var(--border);}
.day-date{color:var(--muted);font-size:10px;font-weight:400;}
.day-body{padding:3px;min-height:44px;}

/* SHIFT SLOTS */
.shift-slot{border-radius:5px;margin-bottom:3px;border:1px solid var(--border);overflow:hidden;background:#fff;}
.ssh{padding:3px 5px;font-size:10px;font-weight:800;display:flex;align-items:center;gap:3px;cursor:pointer;}
.ssh:hover{filter:brightness(.95);}
.ssh-times{font-size:9px;opacity:.8;flex:1;font-weight:400;}
.ssh-edit{font-size:9px;opacity:0;}
.ssh:hover .ssh-edit{opacity:.7;}
.ssb-list{padding:2px 3px;}
.ssb-item{padding:2px 4px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:space-between;border-radius:3px;margin-bottom:1px;}
.ssb-item:hover{background:#fef2f2;}
.ssb-item.conflict{background:#fff0f0;color:var(--danger);}
.ssb-add{width:100%;padding:3px;background:none;border:1px dashed #d1d5db;color:#9ca3af;
  font-size:10px;border-radius:4px;cursor:pointer;font-family:inherit;margin-top:2px;}
.ssb-add:hover{border-color:var(--accent);color:var(--accent);background:#f5f3ff;}
.rmv{background:none;border:none;color:var(--danger);cursor:pointer;font-size:11px;opacity:0;padding:0;}
.shift-slot:hover .rmv{opacity:1;}
.conflict-icon{font-size:9px;}
.day-add-btn{width:100%;padding:3px;background:none;border:1px dashed #d1d5db;color:#9ca3af;
  font-size:9px;border-radius:4px;cursor:pointer;margin-top:2px;font-family:inherit;}
.day-add-btn:hover{border-color:var(--accent);color:var(--accent);background:#f5f3ff;}

/* TABLES */
.table-wrap{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:10px 12px;text-align:right;font-size:12px;font-weight:800;color:var(--muted);border-bottom:1.5px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8faff;}

/* BADGES */
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:800;}
.b-toller{background:#dbeafe;color:#1d4ed8;}
.b-patrol{background:#d1fae5;color:#065f46;}
.b-both{background:#fef3c7;color:#92400e;}
.b-superAdmin{background:#fee2e2;color:#991b1b;}
.b-scheduler{background:#dbeafe;color:#1d4ed8;}
.b-shiftManager{background:#d1fae5;color:#065f46;}
.b-vacation{background:#fef3c7;color:#92400e;}
.b-morning{background:#dbeafe;color:#1d4ed8;}
.b-noon{background:#d1fae5;color:#065f46;}
.b-night{background:#ede9fe;color:#5b21b6;}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.card h4{font-size:14px;font-weight:800;margin:5px 0 3px;}
.card-sub{font-size:12px;color:var(--muted);}

/* ALERTS */
.alert-list{display:flex;flex-direction:column;gap:7px;}
.alert-item{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.alert-item.warn{border-color:#fde68a;background:#fffbeb;}
.alert-item.danger{border-color:#fca5a5;background:#fff5f5;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(30,34,53,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-bg.open{display:flex;}
.modal{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:24px;width:400px;max-width:95vw;box-shadow:0 12px 48px rgba(124,58,237,.15);}
.modal h3{font-size:16px;font-weight:800;margin-bottom:14px;}
.fr{margin-bottom:12px;}
.fr label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.fr input,.fr select{width:100%;padding:9px 12px;background:#f8faff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;}
.fr input:focus,.fr select:focus{outline:none;border-color:var(--accent);}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;}

/* CONS BTNS */
.cons-type-btn{padding:7px 13px;border-radius:7px;border:1.5px solid var(--border);background:#f8faff;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}
.cons-type-btn:hover,.cons-type-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent);}

/* PICK EMP */
.pick-emp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;border:1.5px solid transparent;}
.pick-emp-row:hover{background:#f5f3ff;border-color:#ddd6fe;}
.pick-emp-row .emp-name{font-size:13px;font-weight:700;}
.pick-emp-row .emp-info{font-size:11px;color:var(--muted);}
.block-reason{font-size:11px;color:var(--danger);font-weight:600;}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:6px 14px;border-radius:7px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* COLOR SWATCH */
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.color-swatch:hover,.color-swatch.sel{border-color:#1e2235;transform:scale(1.1);}

/* MY SHIFT */
.my-shift-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:9px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);}
.my-shift-card:hover{border-color:var(--accent);}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.action-card{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;}
.action-card:hover{border-color:var(--accent);background:#f5f3ff;}
.action-card .action-icon{font-size:28px;margin-bottom:6px;}
.action-card .action-label{font-size:14px;font-weight:800;}
.sub-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:12px;}
.sub-opt{background:#f8faff;border:1.5px solid var(--border);border-radius:9px;padding:14px;text-align:center;cursor:pointer;}
.sub-opt:hover{border-color:var(--accent);background:#f5f3ff;}
.sub-opt .so-icon{font-size:22px;}
.sub-opt .so-label{font-size:13px;font-weight:700;margin-top:4px;}
.cand-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.cand-row{background:#f8faff;border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--accent);font-weight:700;cursor:pointer;font-size:14px;margin-bottom:12px;}
.section-header{font-size:17px;font-weight:800;margin-bottom:14px;}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.week-nav h2{font-size:15px;font-weight:800;flex:1;}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px;}
.hours-cell{font-weight:800;color:var(--warn);}
.section-title{font-size:14px;font-weight:800;padding:11px 14px;background:var(--surface2);border-bottom:1.5px solid var(--border);}

/* ===== MOBILE (<=768px) — desktop unaffected ===== */
@media(max-width:768px){
  header{padding:0 8px;gap:6px;height:auto;min-height:50px;flex-wrap:wrap;padding-top:6px;padding-bottom:6px;}
  .header-logo{height:30px;}
  nav{order:3;width:100%;flex-basis:100%;gap:2px;padding-bottom:4px;}
  .nav-btn{padding:6px 9px;font-size:12px;}
  .user-info{font-size:11px;}
  main{padding:10px 8px;}
  .sched-layout{flex-direction:column;}
  .emp-sidebar{width:100%;position:static;top:auto;}
  .emp-list{flex-direction:row;flex-wrap:wrap;max-height:none;}
  .emp-chip{flex:0 0 auto;min-width:calc(50% - 3px);}
  .plazas-wrap{width:100%;}
  /* Days: horizontal scroll on mobile */
  .days-grid{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;}
  .day-col{flex:0 0 78%;max-width:78%;scroll-snap-align:start;border-left:1px solid var(--border);}
  .day-hdr{font-size:13px;padding:9px 4px;}
  .day-date{font-size:11px;}
  .ssh{font-size:12px;padding:5px 6px;}
  .ssh-times{font-size:11px;}
  .ssb-item{font-size:13px;padding:5px 6px;}
  .ssb-add{font-size:12px;padding:6px;}
  .rmv{opacity:1;font-size:15px;padding:0 4px;}
  .stype-btn{padding:9px 16px;font-size:14px;flex:1;}
  .modal{width:94vw;max-width:94vw;padding:18px;}
  table{font-size:12px;}
  th,td{padding:7px 6px;}
  .table-wrap{overflow-x:auto;}
  .btn{padding:10px 16px;}
  .btn-sm{padding:7px 12px;font-size:13px;}
  .week-nav h2{font-size:14px;}
  .cards-grid{grid-template-columns:1fr;}
  .action-grid{grid-template-columns:1fr;}
}
</style>
</head>

<!-- MODALS -->
<div class="modal-bg" id="modalEditShift">
<div class="modal">
  <h3 id="modalEditShiftTitle">עריכת משמרת</h3>
  <div class="fr"><label>שם</label><input id="esName"></div>
  <div class="fr"><label>סוג</label>
    <select id="esType"><option value="morning">בוקר</option><option value="noon">צהריים</option><option value="night">לילה</option></select>
  </div>
  <div class="fr"><label>שעת התחלה</label><input id="esStart" type="time"></div>
  <div class="fr"><label>שעת סיום</label><input id="esEnd" type="time"></div>
  <div class="fr"><label>צבע רקע</label>
    <div class="color-row" id="esColorRow"></div>
    <input type="color" id="esColorCustom" style="margin-top:6px;width:40px;height:28px;border:none;cursor:pointer;border-radius:5px;" title="צבע מותאם אישית">
  </div>
  <div class="modal-btns">
    <button class="btn btn-danger btn-sm" onclick="deletePShiftModal()">מחק</button>
    <button class="btn btn-ghost btn-sm" onclick="closeModal('modalEditShift')">ביטול</button>
    <button class="btn btn-primary btn-sm" onclick="saveEditShift()">שמור</button>
  </div>
</div>
</div>

<div class="modal-bg" id="modalBulkEdit">
<div class="modal" style="width:440px;">
  <h3 id="modalBulkEditTitle">עריכת כמה משמרות</h3>
  <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">בחר משמרות לעריכה משותפת:</p>
  <div id="bulkShiftList" style="max-height:200px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:4px;"></div>
  <hr style="border-color:var(--border);margin-bottom:12px;">
  <div class="fr"><label>שינוי צבע לכל הנבחרות</label>
    <div class="color-row" id="bulkColorRow"></div>
    <input type="color" id="bulkColorCustom" style="margin-top:6px;width:40px;height:28px;border:none;cursor:pointer;border-radius:5px;">
  </div>
  <div class="fr" style="display:flex;gap:8px;">
    <div style="flex:1;"><label>התחלה (אופציונלי)</label><input id="bulkStart" type="time"></div>
    <div style="flex:1;"><label>סיום (אופציונלי)</label><input id="bulkEnd" type="time"></div>
  </div>
  <div class="modal-btns">
    <button class="btn btn-danger btn-sm" onclick="bulkDelete()">מחק נבחרות</button>
    <button class="btn btn-ghost btn-sm" onclick="closeModal('modalBulkEdit')">ביטול</button>
    <button class="btn btn-primary btn-sm" onclick="bulkApply()">החל על נבחרות</button>
  </div>
</div>
</div>

function gi(id){return document.getElementById(id);}
function calcHours(start,end){
  var s=start.split(':').map(Number),e=end.split(':').map(Number);
  var sm=s[0]*60+s[1],em=e[0]*60+e[1];
  if(em<=sm)em+=24*60;
  return Math.round((em-sm)/60*100)/100;
}

function sbH(extra){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(extra)Object.assign(h,extra);
  return h;
}
async function sbGet(t,p){
  var r=await fetch(SB_URL+'/rest/v1/'+t+(p?'?'+p:''),{method:'GET',headers:sbH(),mode:'cors'});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbPost(t,b){
  var r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',mode:'cors',headers:sbH({'Prefer':'return=representation'}),body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbDel(t,p){
  var r=await fetch(SB_URL+'/rest/v1/'+t+'?'+p,{method:'DELETE',mode:'cors',headers:sbH()});
  if(!r.ok)throw new Error(await r.text());
}
async function sbPatch(t,p,b){
  var r=await fetch(SB_URL+'/rest/v1/'+t+'?'+p,{method:'PATCH',mode:'cors',headers:sbH({'Prefer':'return=representation'}),body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(t,b,oc){
  var r=await fetch(SB_URL+'/rest/v1/'+t+'?on_conflict='+oc,{method:'POST',mode:'cors',headers:sbH({'Prefer':'resolution=merge-duplicates,return=representation'}),body:JSON.stringify(b)});

}

    var shifts=await sbGet('shifts','select=*&order=id');

// ── WEEK UTILS ──
function weekStart(off){var d=new Date(),s=new Date(d);s.setDate(d.getDate()-d.getDay()+off*7);return s;}
function weekDates(off){var s=weekStart(off),r=[];for(var i=0;i<7;i++){var d=new Date(s);d.setDate(s.getDate()+i);r.push(d);}return r;}
function fmtDate(d){return(d.getDate()+'').padStart(2,'0')+'/'+(d.getMonth()+1+'').padStart(2,'0');}
function weekLabel(off){var dd=weekDates(off);return fmtDate(dd[0])+' — '+fmtDate(dd[6]);}
function dateStr(wk,di){return weekDates(wk)[di].toISOString().slice(0,10);}
function openWeekPick(returnTab){
  ST._weekPickReturn=returnTab||'sched';
  var rows='';
  for(var off=-4;off<=8;off++){
    var sel=off===ST.weekOff;
    var lbl=weekLabel(off);
    var tag=off===0?' <span style="color:var(--accent);font-weight:800;">(השבוע)</span>':'';
    rows+='<div onclick="pickWeek('+off+')" style="padding:11px 14px;border-radius:9px;cursor:pointer;border:1.5px solid '+(sel?'var(--accent)':'var(--border)')+';background:'+(sel?'#f5f3ff':'#fff')+';font-weight:'+(sel?'800':'600')+';font-size:14px;">📅 '+lbl+tag+'</div>';
  }
  gi('weekPickList').innerHTML=rows;
  openModal('modalWeekPick');
}
function pickWeek(off){ST.weekOff=off;closeModal('modalWeekPick');renderTab(ST._weekPickReturn);}
function pubKey(wk,mode){return wk+'|'+mode;}

// ── SCHED DATA ──
// sched[key] = array of {empId,empName,aId}
function sk(wk,mode,plaza,di,sid){return wk+'|'+mode+'|'+plaza+'|'+di+'|'+sid;}
function getA(wk,mode,plaza,di,sid){return ST.sched[sk(wk,mode,plaza,di,sid)]||[];}

async function addA(wk,mode,plaza,di,sid,emp){
  var k=sk(wk,mode,plaza,di,sid);
  if(!ST.sched[k])ST.sched[k]=[];
  // check not already assigned
  if(ST.sched[k].find(x=>x.empId===emp.id))return;
  try{
    var res=await sbPost('assignments',{week_offset:wk,mode:mode,plaza:plaza,day_index:di,shift_id:sid,emp_id:emp.id,emp_name:emp.name});
    ST.sched[k].push({empId:emp.id,empName:emp.name,aId:res[0].id});
  }catch(e){console.error(e);alert('שגיאה בשמירה: '+e.message);}
}

async function removeA(wk,mode,plaza,di,sid,empId){
  var k=sk(wk,mode,plaza,di,sid);
  var arr=ST.sched[k]||[];
  var item=arr.find(x=>x.empId===empId);
  if(!item)return;
  try{
    await sbDel('assignments','id=eq.'+item.aId);
    ST.sched[k]=arr.filter(x=>x.empId!==empId);
    renderTab('sched');
  }catch(e){alert('שגיאה: '+e.message);}
}

async function setPub(wk,mode,val){
  ST.published[pubKey(wk,mode)]=val;
  if(val){try{await sbUpsert('published',{week_offset:wk,mode:mode},'week_offset,mode');}catch(e){console.error(e);}}
  else{try{await sbDel('published','week_offset=eq.'+wk+'&mode=eq.'+mode);}catch(e){console.error(e);}}
}

// ── CONSTRAINTS ──
function getConsForDate(empId,ds){return ST.cons.find(c=>c.empId===empId&&c.date===ds)||null;}
function getConsForDi(empId,wk,di){return getConsForDate(empId,dateStr(wk,di));}
function checkConflict(empId,wk,di,sh){
  var con=getConsForDi(empId,wk,di);
  if(!con)return null;
  if(con.type==='vacation')return'חופש ביום זה';
  if(con.type===sh.type)return'אילוץ: לא '+CONS_LBL[sh.type];
  return null;
}

// ── ELIGIBILITY ──
function empEligibility(emp,wk,di,sh){
  var cf=checkConflict(emp.id,wk,di,sh);
  if(cf)return{ok:false,reason:cf};
  var todayAssigned=false;
  ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){
    var a=getA(wk,mode,p.key,di,s.id);
    if(a.find(x=>x.empId===emp.id))todayAssigned=true;
  });})});
  if(todayAssigned)return{ok:false,reason:'כבר משובץ היום'};
  var weekCount=0;
  for(var d=0;d<7;d++){['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){
    if(getA(wk,mode,p.key,d,s.id).find(x=>x.empId===emp.id))weekCount++;
  });})});}
  if(weekCount>=6)return{ok:false,reason:'מקסימום 6 משמרות בשבוע'};
  if(sh.type==='night'){
    var nc=0;
    for(var d2=0;d2<7;d2++){['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){
      if(s.type==='night'&&getA(wk,mode,p.key,d2,s.id).find(x=>x.empId===emp.id))nc++;
    });})});}
    if(nc>=3)return{ok:false,reason:'3 לילות בשבוע'};
  }
  var prevWk=wk,prevDi=di-1;
  if(prevDi<0){prevDi=6;prevWk=wk-1;}
  var prevShifts=[];
  ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){
    if(getA(prevWk,mode,p.key,prevDi,s.id).find(x=>x.empId===emp.id))prevShifts.push(s);
  });})});
  for(var i=0;i<prevShifts.length;i++){
    var ps=prevShifts[i];
    var endM=(function(s){var p=s.end.split(':').map(Number),m=p[0]*60+p[1];if(s.type==='night')m+=1440;return m;})(ps);
    var startM=(function(s){var p=s.start.split(':').map(Number);return p[0]*60+p[1]+1440;})(sh);
    if(startM-endM<480)return{ok:false,reason:'פחות מ-8 שעות מנוחה'};
  }
  return{ok:true,reason:''};
}

function countWeekShifts(empId,wk){
  var n=0;for(var d=0;d<7;d++){['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){if(getA(wk,mode,p.key,d,s.id).find(x=>x.empId===empId))n++;});})});}return n;
}
function countWeekNights(empId,wk){
  var n=0;for(var d=0;d<7;d++){['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){if(s.type==='night'&&getA(wk,mode,p.key,d,s.id).find(x=>x.empId===empId))n++;});})});}return n;
}

function buildPlaza(plaza,wk,mode,canEd){
  var dates=weekDates(wk);
  var allPsh=ST.pshifts[mode][plaza.key];
  return`<div class="plaza-section">
    <div class="plaza-hdr ${plaza.cls}">
      <div class="pdot ${plaza.cls}"></div><h3>${plaza.label}</h3>
      ${canEd?`<button class="btn btn-ghost btn-xs" onclick="openBulkEdit('${plaza.key}','${mode}')">✏️ עריכה מרובה</button>`:''}
    </div>
    <div class="days-grid">
      ${dates.map(function(d,di){
        var psh=allPsh.filter(s=>!s.dayOnly||s.dayOnlyDi===di);
        return buildDayCol(plaza,wk,mode,di,d,psh,canEd);
      }).join('')}
    </div>
  </div>`;
}

function buildDayCol(plaza,wk,mode,di,date,psh,canEd){
  var slots=psh.map(function(sh){
    var assignments=getA(wk,mode,plaza.key,di,sh.id);
    var bg=shiftBg(sh),tc=shiftText(sh);
    var hdr=`<div class="ssh" style="background:${bg};color:${tc};"
      onclick="${canEd?`openEditShift('${plaza.key}','${mode}','${sh.id}')`:''}">
      <span>${sh.name}</span><span class="ssh-times">${sh.start}–${sh.end}</span>
      ${canEd?`<span class="ssh-edit">✏️</span>`:''}
    </div>`;
    var empList=assignments.map(function(a){
      var cf=checkConflict(a.empId,wk,di,sh);
      return`<div class="ssb-item${cf?' conflict':''}">
        <span>${cf?'⚠️ ':''}${a.empName}</span>
        ${canEd?`<button class="rmv" onclick="removeA(${wk},'${mode}','${plaza.key}',${di},'${sh.id}',${a.empId})">✕</button>`:''}
      </div>`;
    }).join('');
    var addBtn=canEd?`<button class="ssb-add" onclick="clickSlot('${plaza.key}','${mode}',${di},'${sh.id}')"
      oncontextmenu="openPickEmp('${plaza.key}','${mode}',${di},'${sh.id}');return false;">+ שבץ</button>`:'';
    return`<div class="shift-slot"><div class="ssb-list">${hdr}${empList}${addBtn}</div></div>`;
  }).join('');

  var addBtn=canEd?`<button class="day-add-btn" onclick="openAddShiftDay('${plaza.key}','${mode}',${di})">+ משמרת ליום</button>`:'';
  return`<div class="day-col">
    <div class="day-hdr">${DAYS[di]}<br><span class="day-date">${fmtDate(date)}</span></div>
    <div class="day-body">${slots||'<div style="font-size:9px;color:#9ca3af;text-align:center;padding:5px;">אין משמרות</div>'}${addBtn}</div>
  </div>`;
}

function selEmpFn(id){ST.selEmp=ST.selEmp===id?null:id;renderTab('sched');}

async function clickSlot(plaza,mode,di,sid){
  if(ST.selEmp){
    var emp=ST.employees.find(e=>e.id===ST.selEmp);
    var sh=ST.pshifts[mode][plaza].find(s=>s.id===sid);
    var cf=checkConflict(emp.id,ST.weekOff,di,sh);
    if(cf)alert('⚠️ '+cf);
    await addA(ST.weekOff,mode,plaza,di,sid,emp);
    renderTab('sched');
  } else {
    openPickEmp(plaza,mode,di,sid);
  }
}

function openPickEmp(plaza,mode,di,sid){
  var wk=ST.weekOff;
  ST._pickPlaza=plaza;ST._pickMode=mode;ST._pickDi=di;ST._pickSid=sid;
  var sh=ST.pshifts[mode][plaza].find(s=>s.id===sid);
  var emps=ST.employees.filter(e=>mode==='toller'?(e.type==='toller'||e.type==='both'):(e.type==='patrol'||e.type==='both'));

    return`<div class="pick-emp-row" onclick="doAssign(${e.id},'${elig.ok?'':elig.reason}')">
      <div>
        <div class="emp-name">${e.name}</div>

}

}

async function saveAddShift(){

  var id='ps'+Date.now()+'_'+Math.random().toString(36).slice(2,6);

function esSelColor(c){

async function saveEditShift(){

var bulkSel={};
function openBulkEdit(plaza,mode){
  ST._bulkPlaza=plaza;ST._bulkMode=mode;bulkSel={};
  var pl=PLAZAS.find(p=>p.key===plaza);
  gi('modalBulkEditTitle').textContent='עריכה מרובה — '+pl.label;
  var arr=ST.pshifts[mode][plaza];
  gi('bulkShiftList').innerHTML=arr.map(function(s){
    var dayTag=s.dayOnly?(' ('+DAYS[s.dayOnlyDi]+' בלבד)'):'';
    return '<label style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;"><input type="checkbox" onchange="bulkToggle(\''+s.id+'\',this.checked)" style="width:auto;"> <span style="font-weight:700;">'+s.name+'</span> <span style="color:var(--muted);font-size:11px;">'+s.start+'–'+s.end+dayTag+'</span></label>';
  }).join('');
  gi('bulkColorRow').innerHTML=PRESET_COLORS.map(function(c){return '<div class="color-swatch" style="background:'+c+';" onclick="bulkSelColor(\''+c+'\')"></div>';}).join('');
  gi('bulkColorCustom').value='#ede9fe';
  gi('bulkColorCustom').oninput=function(){bulkSelColor(this.value);};
  gi('bulkStart').value='';gi('bulkEnd').value='';
  ST._bulkColor=null;
  openModal('modalBulkEdit');
}
function bulkToggle(id,on){if(on)bulkSel[id]=true;else delete bulkSel[id];}
function bulkSelColor(c){
  ST._bulkColor=c;
  document.querySelectorAll('#bulkColorRow .color-swatch').forEach(function(s){s.classList.remove('sel');});
  document.querySelectorAll('#bulkColorRow .color-swatch').forEach(function(s){if(s.style.background===c||s.style.backgroundColor===c)s.classList.add('sel');});
  gi('bulkColorCustom').value=c;
}
async function bulkApply(){
  var ids=Object.keys(bulkSel);
  if(!ids.length){alert('בחר לפחות משמרת אחת');return;}
  var arr=ST.pshifts[ST._bulkMode][ST._bulkPlaza];
  var st=gi('bulkStart').value,en=gi('bulkEnd').value;
  for(var k=0;k<ids.length;k++){
    var sid=ids[k];
    var sh=arr.find(function(s){return s.id===sid;});
    if(!sh)continue;
    var patch={};
    if(ST._bulkColor){shiftColorOverride[sid]=ST._bulkColor;patch.color=ST._bulkColor;}
    if(st){sh.start=st;patch.start_time=st;}
    if(en){sh.end=en;patch.end_time=en;}
    if(st||en){sh.hours=calcHours(sh.start,sh.end);patch.hours=sh.hours;}
    if(Object.keys(patch).length){
      try{await sbPatch('shifts','id=eq.'+sid,patch);}catch(e){alert('שגיאה: '+e.message);}
    }
  }
  closeModal('modalBulkEdit');renderTab('sched');
}
async function bulkDelete(){
  var ids=Object.keys(bulkSel);
  if(!ids.length){alert('בחר לפחות משמרת אחת');return;}
  if(!confirm('למחוק '+ids.length+' משמרות?'))return;
  for(var k=0;k<ids.length;k++){
    try{await sbDel('shifts','id=eq.'+ids[k]);}catch(e){}
  }
  ST.pshifts[ST._bulkMode][ST._bulkPlaza]=ST.pshifts[ST._bulkMode][ST._bulkPlaza].filter(function(s){return !bulkSel[s.id];});
  closeModal('modalBulkEdit');renderTab('sched');
}
async function deletePShiftModal(){
  if(!confirm('למחוק משמרת?'))return;
  try{
    await sbDel('shifts','id=eq.'+ST._editSid);
    ST.pshifts[ST._editMode][ST._editPlaza]=ST.pshifts[ST._editMode][ST._editPlaza].filter(s=>s.id!==ST._editSid);
    closeModal('modalEditShift');renderTab('sched');
  }catch(e){alert('שגיאה: '+e.message);}
}

async function saveCons(){
  if(!ST._ct){alert('בחר סוג');return;}
  var date=gi('consDate').value;if(!date){alert('בחר תאריך');return;}
  var emp=ST.employees.find(e=>e.id===ST.consEmpId);
  try{
    var ex=ST.cons.find(c=>c.empId===ST.consEmpId&&c.date===date);
    if(ex){await sbDel('constraints','id=eq.'+ex.id);ST.cons=ST.cons.filter(c=>c.id!==ex.id);}
    var res=await sbPost('constraints',{emp_id:ST.consEmpId,emp_name:emp.name,type:ST._ct,date:date});
    ST.cons.push({id:res[0].id,empId:ST.consEmpId,empName:emp.name,type:ST._ct,date:date});
    refreshConsExisting();renderTab('sched');
  }catch(e){alert('שגיאה: '+e.message);}
}
async function delCons(id){
  try{await sbDel('constraints','id=eq.'+id);ST.cons=ST.cons.filter(c=>c.id!==id);refreshConsExisting();renderTab('sched');}
  catch(e){alert('שגיאה: '+e.message);}
}

function renderEmpView(c){
  var wk=ST.weekOff,dates=weekDates(wk),evMode=ST.empViewMode||'toller';
  function isAssigned(emp,mode){
    for(var d=0;d<7;d++)for(var pi=0;pi<PLAZAS.length;pi++){
      var psh=ST.pshifts[mode][PLAZAS[pi].key].filter(s=>!s.dayOnly||s.dayOnlyDi===d);
      for(var si=0;si<psh.length;si++)if(getA(wk,mode,PLAZAS[pi].key,d,psh[si].id).find(x=>x.empId===emp.id))return true;
    }return false;
  }
  function buildTable(mode,emps){
    var asgnd=emps.filter(e=>isAssigned(e,mode));
    if(!asgnd.length)return'<div class="empty">אין עובדים משובצים</div>';
    var rows=asgnd.map(function(emp){
      var total=0;
      var cells=dates.map(function(_,di){
        var found=[];
        PLAZAS.forEach(function(p){
          var psh=ST.pshifts[mode][p.key].filter(s=>!s.dayOnly||s.dayOnlyDi===di);
          psh.forEach(function(sh){
            if(getA(wk,mode,p.key,di,sh.id).find(x=>x.empId===emp.id)){found.push(p.label.replace('פלאזת ','')+': '+sh.name+' '+sh.start+'–'+sh.end);total+=sh.hours;}
          });
        });
        return`<td style="white-space:nowrap;">${found.map(s=>`<div style="font-size:11px;">${s}</div>`).join('')||'<span style="color:#d1d5db">—</span>'}</td>`;
      }).join('');
      return`<tr><td><b>${emp.name}</b></td><td><span class="badge b-${emp.type}">${TYPE_LBL[emp.type]}</span></td>${cells}<td class="hours-cell">${total}ש'</td></tr>`;
    }).join('');
    return`<table><thead><tr><th>עובד</th><th>תפקיד</th>${dates.map((_,i)=>`<th>${DAYS[i]}<br><span style="color:var(--muted);font-weight:400">${fmtDate(dates[i])}</span></th>`).join('')}<th>סה"כ</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  var tollers=ST.employees.filter(e=>e.type==='toller'||e.type==='both').sort((a,b)=>a.name.localeCompare(b.name,'he'));
  var patrols=ST.employees.filter(e=>e.type==='patrol'||e.type==='both').sort((a,b)=>a.name.localeCompare(b.name,'he'));
  c.innerHTML=`
    <div class="week-nav">
      <button class="btn btn-ghost btn-sm" onclick="ST.weekOff--;renderTab('empview')">◀</button>
      <h2 onclick="openWeekPick('empview')" style="cursor:pointer;" title="לחץ לבחירת שבוע">👤 לפי עובד — ${weekLabel(wk)} 🗓️</h2>
      <button class="btn btn-ghost btn-sm" onclick="ST.weekOff++;renderTab('empview')">▶</button>
    </div>
    <div class="sched-type-bar" style="margin-bottom:12px;">
      <button class="stype-btn toller${evMode==='toller'?' active':''}" onclick="ST.empViewMode='toller';renderTab('empview')">🚗 טולרים</button>
      <button class="stype-btn patrol${evMode==='patrol'?' active':''}" onclick="ST.empViewMode='patrol';renderTab('empview')">🚶 סיירים</button>
    </div>
    <div style="overflow-x:auto;"><div class="table-wrap">
      ${evMode==='toller'?buildTable('toller',tollers):buildTable('patrol',patrols)}
    </div></div>`;
}

// ── ALERTS ──
function buildWarns(wk){
  var warns=[];
  ST.employees.forEach(function(emp){
    var wh=0,wn=0;
    for(var di=0;di<7;di++){
      var today=[];
      ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){
        var psh=ST.pshifts[mode][p.key].filter(s=>!s.dayOnly||s.dayOnlyDi===di);
        psh.forEach(function(sh){
          if(getA(wk,mode,p.key,di,sh.id).find(x=>x.empId===emp.id)){
            today.push({mode,plaza:p.label,sh});wh+=sh.hours;
            if(sh.type==='night')wn++;
            var cf=checkConflict(emp.id,wk,di,sh);
            if(cf)warns.push({level:'danger',msg:'אילוץ — '+emp.name,detail:DAYS[di]+' '+sh.name+' — '+cf});
          }
        });
      })});
      if(today.length>=2)warns.push({level:'danger',msg:'כפל — '+emp.name,detail:DAYS[di]+': '+today.map(x=>x.sh.name).join(', ')});
      var nt=today.filter(x=>x.sh.type==='night');
      if(nt.length&&di<6){
        var mn=false;
        ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){
          ST.pshifts[mode][p.key].filter(s=>!s.dayOnly||s.dayOnlyDi===di+1).forEach(function(sh){
            if(sh.type==='morning'&&getA(wk,mode,p.key,di+1,sh.id).find(x=>x.empId===emp.id))mn=true;
          });
        })});
        if(mn)warns.push({level:'warn',msg:'לילה→בוקר — '+emp.name,detail:DAYS[di]+' → '+DAYS[di+1]});
      }
    }
    if(wn>3)warns.push({level:'warn',msg:'לילות — '+emp.name,detail:wn+' לילות'});
    if(wh>58)warns.push({level:'danger',msg:'שעות — '+emp.name,detail:wh+'ש שעות'});
  });
  return warns;
}

function showSwapCandidates(idx,wantType,dayMode,tdi){
  var ms=window._myShifts[idx],wk=ms.wk,swapDi=dayMode==='same'?ms.di:tdi;
  var candidates=[];
  ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){
    ST.pshifts[mode][p.key].filter(s=>(!s.dayOnly||s.dayOnlyDi===swapDi)&&s.type===wantType).forEach(function(sh){
      var arr=getA(wk,mode,p.key,swapDi,sh.id);
      arr.forEach(function(a){
        if(a.empId===window._myEmp.id)return;
        var otherEmp=ST.employees.find(e=>e.id===a.empId);
        if(!otherEmp)return;
        var myOk=empEligibility(window._myEmp,wk,swapDi,sh);
        var theirOk=empEligibility(otherEmp,wk,ms.di,ms.sh);
        candidates.push({emp:otherEmp,sh,mode,plaza:p,di:swapDi,aId:a.aId,myOk:myOk.ok,theirOk:theirOk.ok,reason:!myOk.ok?myOk.reason:theirOk.reason});
      });
    });
  })});
  var backFn=dayMode==='same'?`openSwapSameDay(${idx})`:`openSwapOtherDayShift(${idx},${tdi})`;
  gi('mainContent').innerHTML=`
    <div class="back-btn" onclick="${backFn}">← חזרה</div>
    <div class="section-header">🔄 אפשרויות החלפה</div>
    <div class="cand-list">
      ${candidates.length?candidates.map(function(cd){
        var ok=cd.myOk&&cd.theirOk;
        return`<div class="cand-row" style="${ok?'':'opacity:.5'}">
          <div><div style="font-weight:700;font-size:14px;">${cd.emp.name}</div>
          <div style="font-size:12px;color:var(--muted);">${cd.plaza.label.replace('פלאזת ','')} | ${cd.sh.start}–${cd.sh.end}</div>
          ${!ok?`<div style="font-size:11px;color:var(--danger);">🚫 ${cd.reason}</div>`:''}
          </div>
          ${ok?`<button class="btn btn-primary btn-sm" onclick="confirmSwap(${idx},'${cd.mode}','${cd.plaza.key}',${cd.di},'${cd.sh.id}',${cd.emp.id},${cd.aId})">החלף</button>`:`<span style="font-size:11px;color:var(--danger)">לא זמין</span>`}
        </div>`;
      }).join(''):'<div class="empty">אין עובדים להחלפה</div>'}
    </div>`;
}
async function confirmSwap(myIdx,theirMode,theirPlaza,theirDi,theirSid,theirEmpId,theirAId){
  var ms=window._myShifts[myIdx],myEmp=window._myEmp;
  var theirEmp=ST.employees.find(e=>e.id===theirEmpId);
  var myArr=getA(ms.wk,ms.mode,ms.plaza.key,ms.di,ms.sh.id);
  var myItem=myArr.find(x=>x.empId===myEmp.id);
  try{
    if(myItem)await sbPatch('assignments','id=eq.'+myItem.aId,{emp_id:theirEmp.id,emp_name:theirEmp.name});
    await sbPatch('assignments','id=eq.'+theirAId,{emp_id:myEmp.id,emp_name:myEmp.name});
    if(myItem){myItem.empId=theirEmp.id;myItem.empName=theirEmp.name;}
    alert('✅ ההחלפה בוצעה');renderTab('myview');
  }catch(e){alert('שגיאה: '+e.message);}
}

// ── STARTUP ──
document.querySelectorAll('.modal-bg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});
function startApp(){
  gi('loginScreen').style.display='none';
  gi('app').style.display='flex';
  loadAllData();
}
setTimeout(startApp,100);
</script>
