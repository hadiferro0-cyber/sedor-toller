    var inP1=pl.p1Ids.includes(empRec.id);
    var time=inP1?pl.p1time:pl.p2time;
    var which=inP1?'ראשונה':'שנייה';
    html+=`<div style="border:1.5px solid var(--mp-teal);border-radius:12px;padding:12px 15px;margin-bottom:10px;background:rgba(109,155,142,0.10);">
      <div style="font-weight:900;font-size:14px;color:var(--mp-teal);">👥 ${pl.title||'ישיבת מחלקה'} — פעימה ${which}</div>
      <div style="font-size:13px;color:var(--text);margin-top:3px;">${DAYS[pl.di]} ${fmtDate(weekDates(wk)[pl.di])} · בשעה <b>${time}</b></div>
    </div>`;
  });
  // events where this employee is a participant
  var myEvents=(ST.events||[]).filter(ev=>ev.weekOff===wk&&(ev.empIds||[]).includes(empRec.id))
    .sort((a,b)=>(a.di-b.di)||(a.time||'').localeCompare(b.time||''));
  myEvents.forEach(function(ev){
    html+=`<div style="border:1.5px solid var(--mp-navy);border-radius:12px;padding:12px 15px;margin-bottom:10px;background:rgba(40,84,126,0.08);">
      <div style="font-weight:900;font-size:14px;color:var(--mp-navy);">📋 ${ev.title}</div>
      <div style="font-size:13px;color:var(--text);margin-top:3px;">${DAYS[ev.di]} ${fmtDate(weekDates(wk)[ev.di])} · בשעה <b>${ev.time}</b></div>
    </div>`;
  });
  if(html)html='<div style="margin-bottom:14px;">'+html+'</div>';
  return html;
}

async function peerApprove(reqId){
  var r=ST.swapReqs.find(x=>x.id===reqId);if(!r)return;
  try{
    await sbPatch('swap_requests','id=eq.'+reqId,{status:'pending_admin'});
    r.status='pending_admin';
    logAction('בקשת '+(r.kind==='swap'?'החלפה':'מסירה')+' אושרה ע"י עובד',r.toName,r.fromName+' → '+r.toName);
    // notify each admin by their External ID (tags are unreliable)
    (ST.managers||[]).filter(m=>m.role==='superAdmin'||m.role==='scheduler').forEach(function(m){
      sendNotify({target:{extId:m.id+'_'+m.role},title:'בקשה ממתינה לאישורך',message:'בקשת '+(r.kind==='swap'?'החלפה':'מסירה')+' בין '+r.fromName+' ל'+r.toName+' מחכה לאישור.'});
    });
    await appAlert('✅ אישרת. הבקשה הועברה לאחראי הסידור.');
    renderTab('myview');
  }catch(e){await appAlert('שגיאה: '+e.message);}
}
async function peerReject(reqId){
  var r=ST.swapReqs.find(x=>x.id===reqId);if(!r)return;
  if(!await appConfirm('לדחות את הבקשה?'))return;
  try{
    await sbPatch('swap_requests','id=eq.'+reqId,{status:'rejected',reject_reason:'נדחה ע"י העובד'});
    r.status='rejected';
    logAction('בקשת '+(r.kind==='swap'?'החלפה':'מסירה')+' נדחתה ע"י עובד',r.toName,r.fromName+' → '+r.toName);
    sendNotify({target:{extId:r.fromId+'_employee'},title:'הבקשה נדחתה',message:r.toName+' דחה/תה את בקשת ה'+(r.kind==='swap'?'החלפה':'מסירה')+'.'});
    await appAlert('הבקשה נדחתה.');
    renderTab('myview');
  }catch(e){await appAlert('שגיאה: '+e.message);}
}

// Plaza swap: same day, SAME shift name, OTHER plaza
function showPlazaSwap(idx){
  var ms=window._myShifts[idx], wk=ms.wk, di=ms.di;
  var myName=ms.sh.name, myPlaza=ms.plaza.key, myMode=ms.mode;
  var candidates=[];
  // look in the OTHER plaza(s), same mode, shifts with the SAME name
  PLAZAS.forEach(function(p){
    if(p.key===myPlaza)return; // other plaza only
    ST.pshifts[myMode][p.key].filter(s=>s.name===myName).forEach(function(sh){
      if(isCanceled(wk,myMode,p.key,di,sh.id))return;
      getA(wk,myMode,p.key,di,sh.id).forEach(function(a){
        if(a.empId===window._myEmp.id)return;
        var otherEmp=ST.employees.find(e=>e.id===a.empId);
        if(!otherEmp)return;
        var myKey=ms.wk+'|'+ms.mode+'|'+myPlaza+'|'+ms.di+'|'+ms.sh.id;
        var theirKey=wk+'|'+myMode+'|'+p.key+'|'+di+'|'+sh.id;
        var myOk=empEligibility(window._myEmp,wk,di,sh,myKey);
        var theirOk=empEligibility(otherEmp,wk,di,ms.sh,theirKey);
        candidates.push({emp:otherEmp,sh:sh,mode:myMode,plaza:p,di:di,myOk:myOk.ok,theirOk:theirOk.ok,reason:!myOk.ok?myOk.reason:theirOk.reason});
      });
    });
  });
  gi('mainContent').innerHTML=`
    <div class="back-btn" onclick="openMySwap(${idx})">← חזרה</div>
    <div class="section-header">החלפת פלאזה — ${myName}</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;">המשמרת שלך: ${DAYS[ms.di]} ${fmtDate(ms.date)} · ${ms.sh.name} · ${ms.plaza.label.replace('פלאזת ','')}</div>
    <div class="cand-list">
      ${candidates.length?candidates.map(function(cd){
        var ok=cd.myOk&&cd.theirOk;
        return`<div class="cand-row" style="${ok?'':'opacity:.55'}">
          <div><div style="font-weight:700;font-size:14px;">${cd.emp.name}</div>
          <div style="font-size:12px;color:var(--muted);">${cd.sh.name} · ${cd.plaza.label.replace('פלאזת ','')} | ${cd.sh.start}–${cd.sh.end}</div>
          ${!ok?`<div style="font-size:11px;color:var(--danger);">🚫 ${cd.reason}</div>`:''}
          </div>
          ${ok?`<button class="btn btn-primary btn-sm" onclick="sendSwapReq(${idx},'${cd.mode}','${cd.plaza.key}',${cd.di},'${cd.sh.id}',${cd.emp.id})">בקש החלפה</button>`:`<span style="font-size:11px;color:var(--danger)">לא זמין</span>`}
        </div>`;
      }).join(''):'<div class="empty">אין עובדים באותה משמרת בפלאזה השנייה</div>'}
    </div>
    <div style="margin-top:14px;padding:13px 15px;background:var(--accent-soft);border:1px solid var(--glass-border);border-radius:12px;font-size:13px;color:var(--accent-deep);line-height:1.6;">
      ℹ️ מוצגים עובדים שעובדים <b>${myName}</b> בפלאזה השנייה באותו יום. הבקשה תישלח לעובד שתבחר, ותעבור לאישור אחראי הסידור.
    </div>`;
}

function showSwapCandidates(idx,wantType,dayMode,tdi){
  var ms=window._myShifts[idx],wk=ms.wk,swapDi=dayMode==='same'?ms.di:tdi;
  var candidates=[];
  ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){
    ST.pshifts[mode][p.key].filter(s=>(!s.dayOnly||s.dayOnlyDi===swapDi)&&s.type===wantType).forEach(function(sh){
      if(isCanceled(wk,mode,p.key,swapDi,sh.id))return; // skip double/cancelled slots
      var arr=getA(wk,mode,p.key,swapDi,sh.id);
      arr.forEach(function(a){
        if(a.empId===window._myEmp.id)return;
        var otherEmp=ST.employees.find(e=>e.id===a.empId);
        if(!otherEmp)return;
        // key of MY shift (the one I'm giving up) and THEIR shift (the one they're giving up)
        var myKey=ms.wk+'|'+ms.mode+'|'+ms.plaza.key+'|'+ms.di+'|'+ms.sh.id;
        var theirKey=wk+'|'+mode+'|'+p.key+'|'+swapDi+'|'+sh.id;
        // can I take their shift? exclude my own shift from my day-count
        var myOk=empEligibility(window._myEmp,wk,swapDi,sh,myKey);
        // can they take my shift? exclude their shift from their day-count
        var theirOk=empEligibility(otherEmp,wk,ms.di,ms.sh,theirKey);
        candidates.push({emp:otherEmp,sh,mode,plaza:p,di:swapDi,aId:a.aId,myOk:myOk.ok,theirOk:theirOk.ok,reason:!myOk.ok?myOk.reason:theirOk.reason});
      });
    });
  })});
  var backFn=dayMode==='same'?`openSwapSameDay(${idx})`:`openSwapOtherDayShift(${idx},${tdi})`;
  gi('mainContent').innerHTML=`
    <div class="back-btn" onclick="${backFn}">← חזרה</div>
    <div class="section-header">בחר עובד להחלפה</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;">המשמרת שלך: ${DAYS[ms.di]} ${fmtDate(ms.date)} · ${ms.sh.name}</div>
    <div class="cand-list">
      ${candidates.length?candidates.map(function(cd){
        var ok=cd.myOk&&cd.theirOk;
        return`<div class="cand-row" style="${ok?'':'opacity:.55'}">
          <div><div style="font-weight:700;font-size:14px;">${cd.emp.name}</div>
          <div style="font-size:12px;color:var(--muted);">${DAYS[cd.di]} · ${cd.plaza.label.replace('פלאזת ','')} | ${cd.sh.start}–${cd.sh.end}</div>
          ${!ok?`<div style="font-size:11px;color:var(--danger);">🚫 ${cd.reason}</div>`:''}
          </div>
          ${ok?`<button class="btn btn-primary btn-sm" onclick="sendSwapReq(${idx},'${cd.mode}','${cd.plaza.key}',${cd.di},'${cd.sh.id}',${cd.emp.id})">בקש החלפה</button>`:`<span style="font-size:11px;color:var(--danger)">לא זמין</span>`}
        </div>`;
      }).join(''):'<div class="empty">אין עובדים להחלפה</div>'}
    </div>
    <div style="margin-top:14px;padding:13px 15px;background:var(--accent-soft);border:1px solid var(--glass-border);border-radius:12px;font-size:13px;color:var(--accent-deep);line-height:1.6;">
      ℹ️ הבקשה תישלח לעובד שתבחר. אם הוא יאשר — היא תעבור לאישור אחראי הסידור, ורק לאחר מכן תתבצע.
    </div>`;
}

  };
  try{

    ST.swapReqs.unshift(mapSwapReq(res[0]));
    logAction('בקשת החלפה נשלחה',myEmp.name+' ↔ '+theirEmp.name,row.a_label+' ⇄ '+row.b_label);
    sendNotify({target:{extId:theirEmp.id+'_employee'},title:'בקשת החלפה חדשה',message:myEmp.name+' שלח/ה לך בקשת החלפה. היכנס לאשר או לדחות.'});

function fmtDMY(iso){if(!iso)return'';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

async function addSick(){
  var empId=parseInt(gi('sickEmp').value);
  if(!empId){await appAlert('בחר עובד');return;}
  var from=gi('sickFrom').value, to=gi('sickTo').value;
  if(!from||!to){await appAlert('בחר תאריכים');return;}
  if(to<from){await appAlert('תאריך הסיום מוקדם מההתחלה');return;}
  var emp=ST.employees.find(e=>e.id===empId);
  var note=gv('sickNote').trim();
  try{
    await sbPost('sick_leave',{emp_id:empId,emp_name:emp.name,from_date:from,to_date:to,note:note});
    await reloadSick();
    // remove existing assignments in the sick range → leave shifts empty
    var removed=await clearSickAssignments(empId,from,to);
    logAction('רישום מחלה',emp.name,fmtDMY(from)+' עד '+fmtDMY(to)+(removed?(' · '+removed+' משמרות פונו'):''));
    await appAlert('✅ '+emp.name+' סומן כחולה'+(removed?('. '+removed+' משמרות פונו ודורשות איוש מחדש.'):'.'));
    renderTab('sick');
  }catch(e){await appAlert('שגיאה: '+e.message);}
}

// remove all assignments of empId that fall on dates within [from,to] (inclusive); returns count
async function clearSickAssignments(empId,from,to){
  var count=0, toDelete=[];
  // scan a reasonable window of weeks around now (-8 .. +12)
  for(var wk=-8; wk<=12; wk++){
    var dates=weekDates(wk);
    for(var di=0; di<7; di++){
      var iso=isoDate(dates[di]);
      if(iso<from||iso>to)continue;
      ['toller','patrol'].forEach(function(mode){PLAZAS.forEach(function(p){ST.pshifts[mode][p.key].forEach(function(s){
        var arr=getA(wk,mode,p.key,di,s.id);
        arr.filter(x=>x.empId===empId).forEach(function(item){
          toDelete.push({wk:wk,mode:mode,plaza:p.key,di:di,sid:s.id,aId:item.aId});
        });
      });})});
    }
  }
  for(var i=0;i<toDelete.length;i++){
    var d=toDelete[i];
    try{ if(d.aId)await sbDel('assignments','id=eq.'+d.aId); }catch(e){console.error('del assign',e);}
    var key=sk(d.wk,d.mode,d.plaza,d.di,d.sid);
    if(ST.sched[key])ST.sched[key]=ST.sched[key].filter(x=>x.empId!==empId);
    count++;
  }
  return count;
}

async function delSick(id){
  if(!await appConfirm('להסיר את רישום המחלה? (המשמרות שפונו לא יוחזרו אוטומטית)'))return;
  try{await sbDel('sick_leave','id=eq.'+id);ST.sick=ST.sick.filter(s=>s.id!==id);renderTab('sick');}
  catch(e){await appAlert('שגיאה: '+e.message);}
}

function eventCard(ev){
  var names=ev.empNames||((ev.empIds||[]).map(id=>{var e=ST.employees.find(x=>x.id===id);return e?e.name:'';}).filter(Boolean).join(', '));
  // conflict check
  var conflicts=[];
  (ev.empIds||[]).forEach(function(id){
    var emp=ST.employees.find(x=>x.id===id); if(!emp)return;
    var sh=dayShifts(emp,ev.weekOff,ev.di);
    if(sh.length){
      // check if event time falls within a shift
      var evMin=tmin(ev.time);
      sh.forEach(function(s){
        var st=shiftStartMin(s), en=shiftEndMin(s);
        if(en>1440){ if(evMin>=st||evMin<=en-1440){conflicts.push(emp.name);} }
        else if(evMin>=st&&evMin<en){conflicts.push(emp.name);}
      });
    }
  });
  return `<div style="border:1px solid var(--glass-border);border-radius:12px;padding:13px 15px;margin-bottom:10px;background:rgba(255,255,255,0.6);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);">

        <div style="font-size:13px;color:var(--muted);margin-top:3px;">${DAYS[ev.di]} ${fmtDate(weekDates(ev.weekOff)[ev.di])} · בשעה ${ev.time}</div>
        <div style="font-size:13px;margin-top:6px;"><b>משתתפים:</b> ${names||'—'}</div>
        ${conflicts.length?`<div style="margin-top:8px;background:#fde8ec;color:#9b1c2e;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;">⚠️ התנגשות עם משמרת: ${[...new Set(conflicts)].join(', ')}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-xs btn-ghost" onclick="openEditEvent(${ev.id})">✎</button>
        <button class="btn btn-xs btn-danger" onclick="delEvent(${ev.id})">🗑</button>
      </div>
    </div>
  </div>`;
}
function tmin(t){if(!t)return 0;var p=t.split(':').map(Number);return p[0]*60+(p[1]||0);}

    <div id="meetResult">${_meetResult?meetResultHTML():''}</div>
    ${publishedPulsesHTML()}`;
}

function publishedPulsesHTML(){
  var list=(ST.pulses||[]).slice().sort((a,b)=>(b.weekOff-a.weekOff)||(b.di-a.di));
  if(!list.length)return '';
  var modeLbl=m=>m==='both'?'טולרים + סיירים':(m==='toller'?'טולרים':'סיירים');
  return `<div style="margin-top:22px;">
    <div class="section-header">חלוקות שפורסמו לעובדים (${list.length})</div>
    ${list.map(pl=>`<div style="border:1px solid var(--glass-border);border-radius:12px;padding:12px 15px;margin-bottom:9px;background:rgba(255,255,255,0.6);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
        <div>
          <div style="font-weight:900;font-size:14px;">👥 ${pl.title||'ישיבת מחלקה'}</div>
          <div style="font-size:12.5px;color:var(--muted);margin-top:2px;">${DAYS[pl.di]} ${fmtDate(weekDates(pl.weekOff)[pl.di])} · ${modeLbl(pl.mode)} · פעימה 1: ${pl.p1time} (${pl.p1Ids.length}) · פעימה 2: ${pl.p2time} (${pl.p2Ids.length})</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-xs btn-ghost" onclick="editPulse(${pl.id})">✎ ערוך</button>
          <button class="btn btn-xs btn-danger" onclick="delPulse(${pl.id})">🗑 בטל</button>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

// Load a published pulse back into the editor to view / adjust / republish
function editPulse(id){
  var pl=(ST.pulses||[]).find(x=>x.id===id); if(!pl)return;
  _meetTab='pulses';
  _meetWk=pl.weekOff; _meetDi=pl.di; _meetMode=pl.mode;
  _meetP1=pl.p1time; _meetP2=pl.p2time; _meetTitle=pl.title||'ישיבת מחלקה';
  if(pl.p1Data&&pl.p2Data){
    // Restore the SAVED division (keeps any manual moves), don't auto-divide again
    function rebuild(list){return list.map(function(o){var e=ST.employees.find(x=>x.id===o.id)||{id:o.id,name:o.name,type:'both'};return {emp:e,note:(o.note!=null?o.note:'')};});}
    _meetResult={p1:rebuild(pl.p1Data),p2:rebuild(pl.p2Data),di:pl.di,wk:pl.weekOff,p1time:pl.p1time,p2time:pl.p2time,mode:pl.mode,title:pl.title||'ישיבת מחלקה'};
    renderTab('meetings');
  } else {
    // Older record without a saved division → recompute the auto split
    _meetResult=null;
    renderTab('meetings');
    setTimeout(function(){ try{computeMeetings();}catch(e){} },60);
  }
}
async function delPulse(id){
  var pl=(ST.pulses||[]).find(x=>x.id===id); if(!pl)return;
  if(!await appConfirm('לבטל את החלוקה? היא תיעלם גם אצל העובדים.'))return;
  try{
    await sbDel('meeting_pulses','id=eq.'+id);
    ST.pulses=ST.pulses.filter(x=>x.id!==id);
    logAction('ביטול חלוקת פעימות',pl.title||'ישיבת מחלקה',DAYS[pl.di]+' '+fmtDate(weekDates(pl.weekOff)[pl.di]));
    renderTab('meetings');
  }catch(e){await appAlert('שגיאה: '+e.message);}
}

function computeMeetings(){
  _meetP1=gi('meetP1').value||'12:00';
  _meetP2=gi('meetP2').value||'15:00';
  _meetTitle=(gi('meetTitle').value||'ישיבת מחלקה').trim();
  var wk=_meetWk, di=_meetDi;
  // pool of employees by mode
  var pool=ST.employees.filter(function(e){
    if(_meetMode==='toller')return e.type==='toller'||e.type==='both';
    if(_meetMode==='patrol')return e.type==='patrol'||e.type==='both';
    return true; // both
  });
  var p1=[], p2=[], unassigned=[];
  pool.forEach(function(e){
    var today=dayShifts(e,wk,di);            // shifts emp has today
    var yChk=dayShifts(e,wk,di-1);           // yesterday's shifts
    var workedNightYesterday=yChk.some(isNightShift);
    if(workedNightYesterday){
      // After a night → second (later) pulse for rest. Applies even if NOT scheduled today.
      p2.push({emp:e,note:'אחרי לילה'});
      return;
    }
    if(!today.length){
      // not scheduled today and no night yesterday → balance later
      unassigned.push(e);
      return;
    }
    // determine by today's (single) shift type
    var sh=today[0];
    var pulse;
    if(sh.type==='morning'){
      pulse=2; // morning → after shift → second
    } else if(sh.type==='noon'){
      pulse=1; // noon → before shift → first
    } else if(isNightShift(sh)){
      pulse=1; // night today, no night yesterday → first (before night)
    } else {
      pulse=1;
    }
    (pulse===1?p1:p2).push({emp:e,note:shiftNote(sh,false)});
  });
  // balance the unassigned between pulses to keep sizes similar
  unassigned.forEach(function(e){
    if(p1.length<=p2.length){p1.push({emp:e,note:'לא משובץ'});}
    else{p2.push({emp:e,note:'לא משובץ'});}
  });
  // sort each pulse alphabetically
  var coll=(a,b)=>a.emp.name.localeCompare(b.emp.name,'he');
  p1.sort(coll); p2.sort(coll);
  _meetResult={p1,p2,di,wk,p1time:_meetP1,p2time:_meetP2,mode:_meetMode,title:_meetTitle};
  gi('meetResult').innerHTML=meetResultHTML();
  logAction('חלוקת פעימות ישיבה',DAYS[di]+' '+fmtDate(weekDates(wk)[di]),'פעימה 1: '+p1.length+' · פעימה 2: '+p2.length);
}

function shiftNote(sh,nightY){
  if(nightY)return 'אחרי לילה';
  if(isNightShift(sh))return 'לילה';
  if(sh.type==='morning')return 'בוקר';
  if(sh.type==='noon')return 'צהריים';
  return '';
}

// Rest hours between an emp's night shift (that ended the morning of day di) and a pulse time on day di.
// Returns null if the employee did NOT work a night the previous day.
function postNightRestGap(emp,wk,di,pulseTime){
  var nights=dayShifts(emp,wk,di-1).filter(isNightShift);
  if(!nights.length)return null;
  var nightEnd=Math.max.apply(null,nights.map(shiftEndMin)); // minutes from di-1 midnight (night already +1440)
  var ph=(pulseTime||'00:00').split(':').map(Number);
  var pulseRel=1440+ph[0]*60+ph[1];
  return (pulseRel-nightEnd)/60;
}
// Manually move an employee to the OTHER pulse (override the auto-division).
// Warns if the employee worked a night and the target pulse leaves under 8h of rest.
async function togglePulse(empId){
  var r=_meetResult; if(!r)return;
  var from, item, idx=r.p1.findIndex(x=>x.emp.id===empId);
  if(idx>=0){item=r.p1[idx];from=1;}
  else{idx=r.p2.findIndex(x=>x.emp.id===empId); if(idx<0)return; item=r.p2[idx]; from=2;}
  var toPulse=(from===1)?2:1;
  var targetTime=(toPulse===1)?r.p1time:r.p2time;
  var gap=postNightRestGap(item.emp,r.wk,r.di,targetTime);
  if(gap!==null && gap<8){
    var gp=Math.round(gap*10)/10;
    var ok=await appConfirm('⚠️ '+item.emp.name+' עבד לילה.\nבין סיום הלילה לפעימה ה'+(toPulse===1?'ראשונה':'שנייה')+' ('+targetTime+') יש כ-'+gp+' שעות מנוחה בלבד — פחות מ-8 שעות.\n\nלשבץ בכל זאת?');
    if(!ok)return;
  }
  (from===1?r.p1:r.p2).splice(idx,1);
  (toPulse===1?r.p1:r.p2).push(item);
  var coll=(a,b)=>a.emp.name.localeCompare(b.emp.name,'he');
  r.p1.sort(coll); r.p2.sort(coll);
  if(gi('meetResult'))gi('meetResult').innerHTML=meetResultHTML();
}
// Employees eligible for this meeting's mode
function pulsePool(){
  var r=_meetResult; if(!r)return [];
  return ST.employees.filter(function(e){
    if(r.mode==='toller')return e.type==='toller'||e.type==='both';
    if(r.mode==='patrol')return e.type==='patrol'||e.type==='both';
    return true;
  });
}
function pulseHasEmp(id){var r=_meetResult; return !!r&&(r.p1.some(x=>x.emp.id===id)||r.p2.some(x=>x.emp.id===id));}
// Remove an employee from the division entirely
function removePulseEmp(empId){
  var r=_meetResult; if(!r)return;
  r.p1=r.p1.filter(x=>x.emp.id!==empId);
  r.p2=r.p2.filter(x=>x.emp.id!==empId);
  if(gi('meetResult'))gi('meetResult').innerHTML=meetResultHTML();
}
// Add an employee (not currently placed) to a pulse, with post-night rest warning
async function addPulseEmp(pn,empId){
  var r=_meetResult; if(!r)return;
  empId=Number(empId); if(!empId||pulseHasEmp(empId))return;
  var emp=ST.employees.find(e=>e.id===empId); if(!emp)return;
  var targetTime=(pn===1)?r.p1time:r.p2time;
  var gap=postNightRestGap(emp,r.wk,r.di,targetTime);
  if(gap!==null && gap<8){
    var gp=Math.round(gap*10)/10;
    if(!await appConfirm('⚠️ '+emp.name+' עבד לילה — בפעימה זו ('+targetTime+') יש כ-'+gp+' שעות מנוחה בלבד (פחות מ-8). להוסיף בכל זאת?'))return;
  }
  var today=dayShifts(emp,r.wk,r.di);
  var yNight=dayShifts(emp,r.wk,r.di-1).some(s=>s.type==='night');
  var note=today.length?shiftNote(today[0],yNight):(yNight?'אחרי לילה':'לא משובץ');
  (pn===1?r.p1:r.p2).push({emp:emp,note:note});
  var coll=(a,b)=>a.emp.name.localeCompare(b.emp.name,'he');
  r.p1.sort(coll); r.p2.sort(coll);
  if(gi('meetResult'))gi('meetResult').innerHTML=meetResultHTML();
}

function meetResultHTML(){
  var r=_meetResult; if(!r)return '';

          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <span style="font-weight:700;font-size:14px;flex:1;min-width:0;">${x.emp.name}</span>
            <span style="font-size:11px;color:var(--muted);background:rgba(0,0,0,0.04);padding:2px 8px;border-radius:10px;white-space:nowrap;">${x.note}</span>
          </div>
          <button onclick="togglePulse(${x.emp.id})" style="width:100%;margin-top:6px;border:1px solid var(--glass-stroke);background:rgba(0,0,0,0.03);border-radius:8px;padding:6px;font-size:12px;font-weight:700;cursor:pointer;color:#333;">⇄ העבר ל${pn===1?'פעימה 2':'פעימה 1'}</button>
        </div>`).join(''):'<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">אין עובדים</div>'}
      </div>
      <div style="padding:10px 14px;border-top:1px solid rgba(0,0,0,0.06);">
        <select onchange="addPulseEmp(${pn},this.value);this.selectedIndex=0;" style="width:100%;padding:8px;border-radius:9px;font-size:13px;background:#fff;border:1px solid var(--glass-stroke);">
          <option value="">➕ הוסף עובד לפעימה זו…</option>
          ${avail.map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}
        </select>
      </div>

  }
  var alreadyPub=(ST.pulses||[]).some(pl=>pl.weekOff===r.wk&&pl.di===r.di&&pl.mode===r.mode);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="font-weight:900;font-size:16px;">${r.title?r.title+' — ':''}${dateLbl} · ${modeLbl}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" onclick="publishPulse()">📢 ${alreadyPub?'עדכן אצל העובדים':'פרסם לעובדים'}</button>
        <button class="btn btn-ghost btn-sm" onclick="printMeetings()">🖨️ הדפס / שמור כתמונה</button>
      </div>
    </div>
    ${alreadyPub?'<div style="background:#dff5ec;color:#0e7a52;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;margin-bottom:12px;">✅ חלוקה זו כבר מפורסמת לעובדים</div>':''}
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.6;">💡 אפשר לערוך ידנית: <b>"העבר"</b> מעביר עובד לפעימה האחרת · בתחתית כל פעימה אפשר <b>"להוסיף עובד"</b>. בסיום לחץ "עדכן/פרסם".</div>
    <div id="meetPrintArea" style="display:flex;gap:14px;flex-wrap:wrap;">
      ${col('פעימה ראשונה',r.p1time,r.p1,'var(--mp-navy)',1)}
      ${col('פעימה שנייה',r.p2time,r.p2,'var(--mp-maroon)',2)}
    </div>`;
}

async function publishPulse(){
  var r=_meetResult; if(!r)return;
  var p1Ids=r.p1.map(x=>x.emp.id), p2Ids=r.p2.map(x=>x.emp.id);
  var row={
    week_off:r.wk, di:r.di, ev_date:isoDate(weekDates(r.wk)[r.di]), mode:r.mode,
    p1_time:r.p1time, p2_time:r.p2time, title:r.title||'ישיבת מחלקה',
    p1_emp_ids:p1Ids.join(','), p2_emp_ids:p2Ids.join(','),
    data:JSON.stringify({p1:r.p1.map(x=>({id:x.emp.id,name:x.emp.name,note:x.note})),p2:r.p2.map(x=>({id:x.emp.id,name:x.emp.name,note:x.note}))})
  };
  try{
    // upsert on (week_off,di,mode)
    await sbUpsert('meeting_pulses',row,'week_off,di,mode');
    await reloadPulses();
    logAction('פרסום פעימות ישיבה לעובדים',DAYS[r.di]+' '+fmtDate(weekDates(r.wk)[r.di]),'פעימה 1: '+p1Ids.length+' · פעימה 2: '+p2Ids.length);
    await appAlert('✅ החלוקה פורסמה — כל עובד יראה את הפעימה שלו ב"המשמרות שלי".');
    gi('meetResult').innerHTML=meetResultHTML();
  }catch(e){await appAlert('שגיאה: '+e.message);}

function printMeetings(){
  var r=_meetResult; if(!r)return;
  var modeLbl=r.mode==='both'?'טולרים + סיירים':(r.mode==='toller'?'טולרים':'סיירים');
  var dateLbl=DAYS[r.di]+', '+fmtDate(weekDates(r.wk)[r.di]);
  function colP(title,time,list){
    return `<div style="flex:1;border:2px solid #28547e;border-radius:12px;overflow:hidden;">
      <div style="background:#28547e;color:#fff;padding:14px;text-align:center;">
        <div style="font-size:20px;font-weight:900;">${title}</div>
        <div style="font-size:30px;font-weight:900;">${time}</div>
        <div style="font-size:13px;">${list.length} עובדים</div>
      </div>
      <div>${list.map((x,i)=>`<div style="padding:10px 16px;font-size:17px;font-weight:700;${i%2?'background:#f3f6fa;':''}">${x.emp.name}</div>`).join('')||'<div style="padding:16px;text-align:center;color:#999;">אין עובדים</div>'}</div>
    </div>`;
  }
  var w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8"><title>פעימות ישיבה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
    body{font-family:'Heebo',Arial,sans-serif;padding:24px;direction:rtl;background:#fff;}
    #sheet{max-width:760px;margin:0 auto;background:#fff;padding:20px;}
    .logo{display:block;margin:0 auto 14px;max-height:90px;}
    h1{text-align:center;color:#28547e;margin:0 0 4px;}
    .sub{text-align:center;color:#666;margin-bottom:20px;font-size:15px;}
    .cols{display:flex;gap:18px;}
    .btns{text-align:center;margin-top:20px;}
    .btns button{padding:10px 22px;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;margin:0 5px;}
    @media print{.btns{display:none;}}
    </style></head><body>
    <div id="sheet">
      <img src="${MEET_LOGO}" class="logo" alt="לוגו">
      <h1>${r.title||'פעימות ישיבת מחלקה'}</h1>
      <div class="sub">${dateLbl} · ${modeLbl}</div>
      <div class="cols">${colP('פעימה ראשונה',r.p1time,r.p1)}${colP('פעימה שנייה',r.p2time,r.p2)}</div>
    </div>
    <div class="btns">
      <button onclick="window.print()" style="background:#28547e;color:#fff;">🖨️ הדפס</button>
      <button onclick="dlImg()" style="background:#6d9b8e;color:#fff;">📷 שמור כתמונה</button>
    </div>
    <script>
    function dlImg(){
      var el=document.getElementById('sheet');
      html2canvas(el,{scale:2,backgroundColor:'#ffffff'}).then(function(canvas){
        var link=document.createElement('a');
        link.download='פעימות-ישיבה-${dateLbl.replace(/[ ,\/]/g,'-')}.png';
        link.href=canvas.toDataURL('image/png');
        link.click();
      });
    }
    <\/script>
    </body></html>`);
  w.document.close();
}

// ── ADMIN: SWAP/TRANSFER REQUESTS ──
var _swapTab='active';      // 'active' | 'history'
var _swapHistWk=0;          // week offset currently shown in history
function renderSwapReqs(c){
  var reqs=ST.swapReqs||[];
  var pending=reqs.filter(r=>r.status==='pending_admin');
  var waitingPeer=reqs.filter(r=>r.status==='pending_peer');

  function card(r,showBtns){
    var kindLbl=r.kind==='swap'?'החלפה':'מסירה';
    var body=r.kind==='swap'
      ?`<div style="font-size:13px;color:var(--muted);line-height:1.7;"><b>${r.fromName}</b>: ${r.aLabel}<br><b>${r.toName}</b>: ${r.bLabel}</div>`
      :`<div style="font-size:13px;color:var(--muted);line-height:1.7;"><b>${r.fromName}</b> מוסר/ת ל<b>${r.toName}</b><br>${r.aLabel}</div>`;
    var statusBadge=r.status==='approved'?'<span style="background:#0e9f6e;color:#fff;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;">✓ אושר</span>'
      :r.status==='rejected'?'<span style="background:#fde8ec;color:#9b1c2e;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;">✗ נדחה'+(r.reason?' — '+r.reason:'')+'</span>'
      :r.status==='pending_peer'?'<span style="background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;">ממתין לאישור '+r.toName+'</span>':'';
    return `<div style="border:1px solid var(--glass-border);border-radius:12px;padding:13px 15px;margin-bottom:10px;background:rgba(255,255,255,0.6);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-weight:900;font-size:14px;">🔄 ${kindLbl} — ${r.fromName}${r.kind==='swap'?' ↔ '+r.toName:' → '+r.toName}</div>
        ${statusBadge}
      </div>
      ${body}
      ${(r.status==='approved'||r.status==='rejected')&&r.decidedBy?`<div style="font-size:11.5px;color:var(--muted);margin-top:7px;border-top:1px solid var(--glass-border);padding-top:6px;">${r.status==='approved'?'✓ אושר ע"י':'✗ טופל ע"י'}: <b>${r.decidedBy}</b></div>`:''}
      ${showBtns?`<div style="display:flex;gap:8px;margin-top:11px;">
        <button class="btn btn-primary btn-sm" onclick="adminApproveSwap(${r.id})">✓ אשר ובצע</button>
        <button class="btn btn-danger btn-sm" onclick="adminRejectSwap(${r.id})">✗ דחה</button>
      </div>`:''}
    </div>`;
  }

  // Big red alert if there are pending requests
  var alertBar = pending.length
    ? `<div style="margin-bottom:16px;border-radius:14px;padding:14px 18px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;box-shadow:0 6px 20px rgba(220,38,38,0.4);display:flex;align-items:center;gap:12px;animation:pulseGlow 2s ease-in-out infinite;">
        <div style="font-size:26px;">🔔</div>
        <div><div style="font-weight:900;font-size:16px;">${pending.length} ${pending.length===1?'בקשה ממתינה':'בקשות ממתינות'} לאישורך</div>
        <div style="font-size:13px;opacity:.95;">יש לאשר או לדחות כדי שההחלפה תתבצע בסידור.</div></div>
      </div>`
    : '';

  // Sub-tab bar
  var tabBar = `<div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn btn-sm ${_swapTab==='active'?'btn-primary':'btn-ghost'}" onclick="_swapTab='active';renderTab('swapreqs')">פעילות${pending.length?' ('+pending.length+')':''}</button>
    <button class="btn btn-sm ${_swapTab==='history'?'btn-primary':'btn-ghost'}" onclick="_swapTab='history';renderTab('swapreqs')">היסטוריה</button>
  </div>`;

  var inner='';
  if(_swapTab==='active'){
    inner = `${alertBar}
      <div class="section-header" style="color:var(--mp-maroon);">ממתין לאישורך (${pending.length})</div>
      ${pending.length?pending.map(r=>card(r,true)).join(''):'<div class="empty">אין בקשות שממתינות לאישור</div>'}
      ${waitingPeer.length?`<div class="section-header" style="margin-top:18px;">ממתין לאישור העובד השני (${waitingPeer.length})</div>${waitingPeer.map(r=>card(r,false)).join('')}`:''}`;
  } else {
    // history — closed requests (approved/rejected) for the selected week
    var wk=_swapHistWk;
    var hist=reqs.filter(r=>(r.status==='approved'||r.status==='rejected')&&r.aWk===wk)
                 .sort((a,b)=> (b.createdAt||'').localeCompare(a.createdAt||''));
    inner = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;background:rgba(255,255,255,0.55);border:1px solid var(--glass-stroke);border-radius:14px;padding:8px 14px;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:var(--glass-shadow);">
        <button class="btn btn-ghost btn-sm" onclick="_swapHistWk--;renderTab('swapreqs')">◀ הקודם</button>
        <div style="flex:1;text-align:center;">
          ${wk===currentWeekOffset()?'<div style="display:inline-block;background:#0e9f6e;color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px;margin-bottom:3px;">שבוע נוכחי</div>':''}
          <div style="font-size:16px;font-weight:900;">${weekLabelFull(wk)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="_swapHistWk++;renderTab('swapreqs')">הבא ▶</button>
      </div>
      ${hist.length?hist.map(r=>card(r,false)).join(''):'<div class="empty">אין החלפות/מסירות שאושרו או נדחו בשבוע זה</div>'}`;
  }

  c.innerHTML=`
    <h2 style="font-size:18px;font-weight:800;margin-bottom:14px;">🔄 בקשות החלפה ומסירה</h2>
    ${tabBar}
    ${inner}`;
}

async function adminApproveSwap(reqId){
  var r=ST.swapReqs.find(x=>x.id===reqId);if(!r)return;
  // verify both still valid
  var fromArr=getA(r.aWk,r.aMode,r.aPlaza,r.aDi,r.aSid);
  var fromItem=fromArr.find(x=>x.empId===r.fromId);
  if(!fromItem){await appAlert('⚠️ המשמרת המקורית של '+r.fromName+' כבר לא קיימת בסידור. ייתכן ששובצה מחדש. הבקשה תיסגר.');await adminRejectSwap(reqId,'המשמרת המקורית השתנתה',true);return;}
  try{
    if(r.kind==='transfer'){
      var toEmp=ST.employees.find(e=>e.id===r.toId);
      await sbPatch('assignments','id=eq.'+fromItem.aId,{emp_id:toEmp.id,emp_name:toEmp.name});
      fromItem.empId=toEmp.id;fromItem.empName=toEmp.name;
    } else {
      // swap: find their assignment
      if(isCanceled(r.bWk,r.bMode,r.bPlaza,r.bDi,r.bSid)){await appAlert('⚠️ משמרת היעד סומנה כעת ככפולה. הבקשה תיסגר.');await adminRejectSwap(reqId,'משמרת היעד שונתה לכפולה',true);return;}
      var toArr=getA(r.bWk,r.bMode,r.bPlaza,r.bDi,r.bSid);
      var toItem=toArr.find(x=>x.empId===r.toId);
      if(!toItem){await appAlert('⚠️ המשמרת של '+r.toName+' כבר לא קיימת. הבקשה תיסגר.');await adminRejectSwap(reqId,'משמרת העובד השני השתנתה',true);return;}
      var fromEmp=ST.employees.find(e=>e.id===r.fromId),toEmp2=ST.employees.find(e=>e.id===r.toId);
      await sbPatch('assignments','id=eq.'+fromItem.aId,{emp_id:toEmp2.id,emp_name:toEmp2.name});
      await sbPatch('assignments','id=eq.'+toItem.aId,{emp_id:fromEmp.id,emp_name:fromEmp.name});
      fromItem.empId=toEmp2.id;fromItem.empName=toEmp2.name;
      toItem.empId=fromEmp.id;toItem.empName=fromEmp.name;
    }
    var adminName=ST.user.name||ST.user.username||'אחראי הסידור';
    await sbPatch('swap_requests','id=eq.'+reqId,{status:'approved',decided_by:adminName});
    r.status='approved';r.decidedBy=adminName;
    logAction((r.kind==='swap'?'החלפה':'מסירה')+' אושרה ובוצעה',r.fromName+(r.kind==='swap'?' ↔ ':' → ')+r.toName,r.aLabel);
    sendNotify({target:{extId:r.fromId+'_employee'},title:'הבקשה אושרה ✅',message:'בקשת ה'+(r.kind==='swap'?'החלפה':'מסירה')+' שלך אושרה ובוצעה בסידור.'});
    if(r.kind==='swap')sendNotify({target:{extId:r.toId+'_employee'},title:'החלפה בוצעה ✅',message:'ההחלפה עם '+r.fromName+' אושרה ובוצעה בסידור.'});
    await appAlert('✅ הבקשה אושרה והשינוי בוצע בסידור.');
    renderTab('swapreqs');
  }catch(e){await appAlert('שגיאה: '+e.message);}
}
async function adminRejectSwap(reqId,presetReason,silent){
  var r=ST.swapReqs.find(x=>x.id===reqId);if(!r)return;
  var reason=presetReason;
  if(!silent){
    reason=await appPrompt('סיבת הדחייה (אפשר להשאיר ריק):','');
    if(reason===null)return; // cancelled
  }
  try{
    var adminName2=ST.user.name||ST.user.username||'אחראי הסידור';
    await sbPatch('swap_requests','id=eq.'+reqId,{status:'rejected',reject_reason:reason||'נדחה ע"י אחראי הסידור',decided_by:silent?'המערכת':adminName2});
    r.status='rejected';r.reason=reason||'נדחה ע"י אחראי הסידור';r.decidedBy=silent?'המערכת':adminName2;
    logAction((r.kind==='swap'?'החלפה':'מסירה')+' נדחתה ע"י אחראי',r.fromName,r.reason);
    if(!silent)sendNotify({target:{extId:r.fromId+'_employee'},title:'הבקשה נדחתה',message:'בקשת ה'+(r.kind==='swap'?'החלפה':'מסירה')+' שלך נדחתה'+(reason?' — '+reason:'')+'.'});
    if(!silent){await appAlert('הבקשה נדחתה.');renderTab('swapreqs');}
  }catch(e){await appAlert('שגיאה: '+e.message);}
}

  gi('loginScreen').style.display='none';
  gi('app').style.display='flex';

}
setTimeout(startApp,100);
